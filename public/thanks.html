<!doctype html>
<html lang="ja">
  <head>
    {{>head}}
  </head>
  <body>
    <main>
      <div class="thanks__wrapper">
        <div class="thanks__inner">
          <h1 class="thanks__title">お問い合わせありがとうございました。</h1>
          <div class="thanks__logo u-mt32">
            <a class="thanks__logo_link" href="index.html" aria-label="GAURA STUDIOのイメージロゴ">
              <img
                class="logo__image"
                src="/assets/images/logo.png"
                srcset="/assets/images/logo.png 1x, /assets/images/logo@2x.png 2x"
                width="47"
                height="47"
                alt=""
                decoding="async"
              />
            </a>
            <h2 class="thanks__heading">
              GAURA
              <span class="thanks__heading_secondary">STUDIO</span>
            </h2>
          </div>
          <!-- /.thanks__logo -->
          <p class="thanks__text u-mt48">
            <a class="thanks__text_link" href="index.html">元のページに戻る</a>
          </p>
        </div>
        <!-- /.ly_thanks__inner -->
        <div class="thanks__imageInner">
          <img
            class="thanks__image"
            src="/assets/images/gaura-bg.png"
            srcset="/assets/images/gaura-bg.png 1x, /assets/images/gaura-bg@2x.png 2x"
            alt=""
            width="250"
            height="250"
            decoding="async"
          />
        </div>
        <!-- /.thanks__imageInner -->
      </div>
      <!-- /.thanks__wrapper -->
    </main>
    {{>script}}
  </body>
</html>
